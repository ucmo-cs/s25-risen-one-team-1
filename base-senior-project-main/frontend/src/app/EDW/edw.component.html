<div class="edw-container">
  <h1>Employee Data Warehouse</h1>

  <div class="view-selector">
    <label>Select Date:</label>
    <input type="date" [(ngModel)]="selectedDate" (change)="getAggregatedData()">

    <label>View:</label>
    <select [(ngModel)]="selectedView" (change)="getAggregatedData()">
      <option value="week">Weekly View</option>
      <option value="month">Monthly View</option>
    </select>
  </div>

  <table>
    <thead>
    <tr>
      <th>Employee Name</th>
      <th>Role</th>
      <th>Total Hours Worked</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let emp of getAggregatedData()">
      <td>{{ emp.name }}</td>
      <td>{{ emp.role }}</td>
      <td>{{ emp.totalHours }}</td>
    </tr>
    </tbody>
  </table>
</div>
